spring:
  profiles:
    default: dev
  application:
    name: xstore-kafka-publisher
  main:
    banner-mode: console
  datasource:
    url: jdbc:oracle:thin:@${DB_HOST:localhost}:1521:${DB_SID:JCR}
    username: ${DB_USER:recon}
    password: ${DB_PASSWORD:}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 30000
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
    producer:
      acks: all
      retries: 10
      enable-idempotence: true
      compression-type: snappy
      linger-ms: 5
      batch-size: 65536
      transaction-id-prefix: xstore-pub-${publisher.store-id}
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

runtime-config:
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:5432/${PG_DB:recondb}?options=-c%20TimeZone%3DUTC
    username: ${PG_USER:recon}
    password: ${PG_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 2
      connection-timeout: 30000

publisher:
  store-id: ${STORE_ID:1007}
  org-id: ${ORG_ID:1}
  tenant-id: ${TENANT_ID:tenant-india}
  tenant-timezone: ${TENANT_TIMEZONE:Asia/Kolkata}
  poll-interval-ms: ${PUBLISHER_POLL_INTERVAL_MS:30000}
  batch-size: ${PUBLISHER_BATCH_SIZE:100}
  max-retries: ${PUBLISHER_MAX_RETRIES:5}
  lookback-hours: ${PUBLISHER_LOOKBACK_HOURS:96}
  processing-lock-timeout-minutes: ${PUBLISHER_PROCESSING_LOCK_TIMEOUT_MINUTES:15}
  scheduler-enabled: ${PUBLISHER_SCHEDULER_ENABLED:true}

kafka:
  topic:
    xstore-pos-transactions: ${KAFKA_XSTORE_POS_TOPIC:xstore.pos.transactions.raw}
    integration-canonical: ${KAFKA_INTEGRATION_CANONICAL_TOPIC:integration.canonical.transactions}
    dlq: ${KAFKA_DLQ_TOPIC:recon.dlq}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true

connector:
  security:
    username: ${CONNECTOR_ADMIN_USER:connector-admin}
    password: ${CONNECTOR_ADMIN_PASSWORD:}

logging:
  level:
    com.recon: ${LOG_LEVEL_COM_RECON:INFO}
    org.springframework.kafka: INFO

server:
  port: ${SERVER_PORT:8181}
