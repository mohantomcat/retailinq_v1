<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
  <style>
    .retail { font: 500 48px 'Inter', 'Montserrat', Arial, sans-serif; fill: #1E293B; }
    .iq { font: 800 48px 'Inter', 'Montserrat', Arial, sans-serif; fill: #2563EB; }
  </style>

  <!-- Retail Text -->
  <text x="20" y="75" class="retail">Retail</text>

  <!-- IQ Text -->
  <text x="170" y="75" class="iq">I</text>

  <!-- Custom Q with analytics arrow -->
  <g transform="translate(205,35)">
    <!-- Q Circle -->
    <circle cx="30" cy="30" r="28" stroke="#2563EB" stroke-width="6" fill="none"></circle>
    
    <!-- Arrow inside Q -->
    <polyline points="18,38 28,28 38,34 48,22" fill="none" stroke="#10B981" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>

    <!-- Arrow head -->
    <polygon points="48,22 44,22 48,18 52,22" fill="#10B981"></polygon>

    <!-- Q Tail -->
    <line x1="48" y1="48" x2="65" y2="65" stroke="#2563EB" stroke-width="6" stroke-linecap="round"></line>
  </g>
</svg>
