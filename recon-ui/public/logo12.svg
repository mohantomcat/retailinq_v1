<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <g stroke="#FFFFFF" fill="#FFFFFF">

    <!-- magnifier circle -->
    <circle cx="28" cy="28" r="16" fill="none" stroke-width="4"></circle>

    <!-- magnifier handle -->
    <line x1="40" y1="40" x2="54" y2="54" stroke-width="5" stroke-linecap="round"></line>

    <!-- analytics bars -->
    <rect x="21" y="32" width="3.5" height="7" rx="1"></rect>
    <rect x="26" y="29" width="3.5" height="10" rx="1"></rect>
    <rect x="31" y="26" width="3.5" height="13" rx="1"></rect>

    <!-- trend line -->
    <polyline points="20,30 28,24 34,20" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>

  </g>

</svg>