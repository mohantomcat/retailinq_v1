  <!-- Handle -->
  <line x1="66" y1="66" x2="88" y2="88" stroke="white" stroke-width="10" stroke-linecap="round"></line>

  <!-- Analytics bars -->
  <rect x="30" y="50" width="8" height="15" fill="white" rx="2"></rect>
  <rect x="42" y="42" width="8" height="23" fill="white" rx="2"></rect>
  <rect x="54" y="35" width="8" height="30" fill="white" rx="2"></rect>

  <!-- Trend line -->
