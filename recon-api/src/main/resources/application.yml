spring:
  profiles:
    default: dev
  application:
    name: recon-api
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:5432/${PG_DB:recondb}?options=-c%20TimeZone%3DUTC
    username: ${PG_USER:recon}
    password: ${PG_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: recon
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    table: recon_api_flyway_schema_history

server:
  port: 8090

elasticsearch:
  host: ${ES_HOST:localhost}
  port: ${ES_PORT:9200}
  scheme: ${ES_SCHEME:http}
  username: ${ES_USER:}
  password: ${ES_PASSWORD:}

app:
  jwt:
    secret: ${APP_JWT_SECRET:}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  security:
    cors:
      allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:}
      allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,DELETE,OPTIONS}
      allowed-headers: ${APP_CORS_ALLOWED_HEADERS:*}
    sso:
      ui-base-url: ${APP_SSO_UI_BASE_URL:http://localhost:5173}
    auth:
      max-failed-attempts: ${APP_AUTH_MAX_FAILED_ATTEMPTS:5}
      lockout-duration-minutes: ${APP_AUTH_LOCKOUT_DURATION_MINUTES:15}
      rate-limit-max-attempts: ${APP_AUTH_RATE_LIMIT_MAX_ATTEMPTS:10}
      rate-limit-window-seconds: ${APP_AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
    api-keys:
      default-expiration-days: ${APP_API_KEYS_DEFAULT_EXPIRATION_DAYS:90}
      max-expiration-days: ${APP_API_KEYS_MAX_EXPIRATION_DAYS:365}
  alerting:
    enabled: ${APP_ALERTING_ENABLED:true}
    generation-interval-ms: ${APP_ALERTING_GENERATION_INTERVAL_MS:300000}
    escalation-enabled: ${APP_ALERTING_ESCALATION_ENABLED:true}
    escalation-interval-ms: ${APP_ALERTING_ESCALATION_INTERVAL_MS:300000}
    email:
      enabled: ${APP_ALERTING_EMAIL_ENABLED:false}
      from: ${APP_ALERTING_EMAIL_FROM:no-reply@retailinq.local}
      from-name: ${APP_ALERTING_EMAIL_FROM_NAME:RetailINQ Alerts}
      app-base-url: ${APP_ALERTING_EMAIL_APP_BASE_URL:http://localhost:5173}
    webhook:
      enabled: ${APP_ALERTING_WEBHOOK_ENABLED:false}
      connect-timeout-ms: ${APP_ALERTING_WEBHOOK_CONNECT_TIMEOUT_MS:5000}
      read-timeout-ms: ${APP_ALERTING_WEBHOOK_READ_TIMEOUT_MS:10000}
      app-base-url: ${APP_ALERTING_WEBHOOK_APP_BASE_URL:http://localhost:5173}
  operations:
    connector-admin-user: ${CONNECTOR_ADMIN_USER:connector-admin}
    connector-admin-password: ${CONNECTOR_ADMIN_PASSWORD:}
    xstore-base-url: ${OPS_XSTORE_BASE_URL:http://localhost:8181}
    sim-base-url: ${OPS_SIM_BASE_URL:http://localhost:8182}
    rms-base-url: ${OPS_RMS_BASE_URL:http://localhost:8186}
    siocs-cloud-base-url: ${OPS_SIOCS_CLOUD_BASE_URL:http://localhost:8184}
    mfcs-rds-base-url: ${OPS_MFCS_RDS_BASE_URL:http://localhost:8185}
    xocs-cloud-base-url: ${OPS_XOCS_CLOUD_BASE_URL:http://localhost:8183}
  collaboration:
    callback-base-url: ${APP_COLLABORATION_CALLBACK_BASE_URL:http://localhost:8090}
  activity:
    sox-report:
      enabled: ${APP_ACTIVITY_SOX_REPORT_ENABLED:false}

logging:
  level:
    com.recon: DEBUG
    org.springframework.web: INFO
